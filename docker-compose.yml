version: '3.8'

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: event_reservation_php
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - db
    networks:
      - event_network
    environment:
      - APP_ENV=dev
      - DATABASE_URL=mysql://root:root@db:3306/event_reservation?serverVersion=8.0&charset=utf8mb4

  nginx:
    image: nginx:alpine
    container_name: event_reservation_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - event_network

  db:
    image: mysql:8.0
    container_name: event_reservation_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: event_reservation
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - event_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: event_reservation_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db
    networks:
      - event_network

volumes:
  db_data:

networks:
  event_network:
    driver: bridge
